<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria Ita Macêdo | Portfólio</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">
  <img
    src="assets/profile.jpeg"
    alt="Maria Ita Macêdo"
    class="profile-img profile-img-home"
    data-animate
  />
  
  <h1 data-animate>Maria Ita Macêdo</h1>
  
  <p class="subtitle" data-animate>
    Analista de Dados & BI focada em transformar dados em insights estratégicos, com experiência
    em visualização, automação e suporte à decisão em ambientes críticos.
  </p>

  <div class="buttons" data-animate>
    <a href="projects.html" class="button primary">Projetos</a>
    <a href="certificates.html" class="button secondary">Certificados</a>
    <a href="skills.html" class="button secondary">Skills</a>
    <a href="contacts.html" class="button secondary">Contato</a>
  </div>
</header>

<section class="cards-grid" id="home-projects">
  <!-- Os dois projetos de destaque serão gerados via JS -->
</section>

<footer>
  <p>© 2026 — Maria Ita Macêdo</p>
</footer>

<script src="script.js"></script>
<script>
  // ==========================
  // Destaque de projetos na home
  // ==========================
  document.addEventListener("DOMContentLoaded", () => {
    const projects = [
      {
        title: "🏥 Command Center Hospitalar",
        description: "Acompanhamento em tempo real das operações hospitalares para gestão eficiente e tomada de decisão ágil.",
        link: "https://seulink.com/command-center"
      },
      {
        title: "🛠 Automação",
        description: "Geração automática de recibos via Google Apps Script. Este projeto automatiza a geração de recibos financeiros utilizando o Google Sheets como fonte de dados e o Google Docs para criação dos documentos.",
        link: null
      },
      {
        title: "📊 Análise de Dados",
        description: "Criação de dashboards e indicadores estratégicos com foco em clareza e impacto.",
        link: "https://seulink.com/analise-dados"
      }
    ];

    const cardsContainer = document.getElementById("home-projects");

    // Mostrar apenas 2 projetos na home
    projects.slice(0, 2).forEach(project => {
      const card = document.createElement("div");
      card.classList.add("card");
      card.setAttribute("data-animate", "");

      const title = document.createElement("h3");
      title.innerText = project.title;

      const desc = document.createElement("p");
      desc.innerText = project.description;

      card.appendChild(title);
      card.appendChild(desc);

      if (project.link) {
        const a = document.createElement("a");
        a.href = project.link;
        a.target = "_blank";
        a.classList.add("button", "primary");
        a.innerText = "Acessar Projeto";
        card.appendChild(a);
      } else {
        const span = document.createElement("span");
        span.classList.add("button", "secondary");
        span.innerText = "Em Andamento";
        card.appendChild(span);
      }

      cardsContainer.appendChild(card);

      // Adiciona animação
      const observer = new IntersectionObserver(
        (entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add("show");
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.15 }
      );
      observer.observe(card);
    });
  });
</script>

</body>
</html>
